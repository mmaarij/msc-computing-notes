<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>Notes Reader</title>
      <link rel="manifest" href="manifest.json">
      <meta name="theme-color" content="#111">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
      <style>
         html,body{
         margin:0;
         height:100%;
         overflow:hidden;
         font-family:sans-serif;
         background:#f2f2f2;
         }
         /* ── shelf ── */
         #shelf{
         height:100%;
         overflow-y:auto;
         padding:24px 16px 40px;
         box-sizing:border-box;
         }
         #shelf h1{
         text-align:center;
         font-size:22px;
         margin:0 0 6px;
         letter-spacing:0.5px;
         }
         #shelf .subtitle{
         text-align:center;
         font-size:13px;
         color:#666;
         margin:0 0 28px;
         }
         .bookGrid{
         display:grid;
         grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
         gap:16px;
         max-width:720px;
         margin:0 auto;
         }
         .bookCard{
         border-radius:12px;
         padding:20px;
         cursor:pointer;
         transition:transform 0.15s ease,box-shadow 0.15s ease;
         position:relative;
         overflow:hidden;
         }
         .bookCard:hover{
         transform:translateY(-3px);
         box-shadow:0 8px 24px rgba(0,0,0,0.12);
         }
         .bookCard:active{
         transform:scale(0.97);
         }
         .bookEmoji{
         font-size:32px;
         margin-bottom:10px;
         }
         .bookTitle{
         font-size:16px;
         font-weight:700;
         margin-bottom:4px;
         color:#1a1a1a;
         }
         .bookDesc{
         font-size:12px;
         color:#555;
         margin-bottom:12px;
         }
         .bookProgress{
         font-size:11px;
         color:#333;
         background:rgba(255,255,255,0.55);
         display:inline-block;
         padding:3px 8px;
         border-radius:20px;
         }
         /* ── reader ── */
         #readerView{
         display:none;
         height:100%;
         }
         #viewer{
         display:flex;
         align-items:center;
         justify-content:center;
         height:100%;
         transition:transform 0.25s ease;
         }
         canvas{
         max-width:100%;
         max-height:100%;
         box-shadow:0 6px 30px rgba(0,0,0,0.25);
         border-radius:6px;
         }
         #controls{
         position:fixed;
         top:10px;
         left:10px;
         right:10px;
         display:flex;
         justify-content:space-between;
         z-index:10;
         pointer-events:none;
         }
         #controls button{
         pointer-events:auto;
         }
         #rightControls{
         display:flex;
         gap:8px;
         }
         button{
         padding:6px 10px;
         border:none;
         border-radius:6px;
         background:#000;
         color:white;
         font-size:14px;
         cursor:pointer;
         }
         #pageIndicator{
         position:fixed;
         bottom:14px;
         right:14px;
         background:#000a;
         color:white;
         padding:6px 10px;
         border-radius:6px;
         font-size:12px;
         display:none;
         }
         /* ── dark mode ── */
         .dark{
         background:#111;
         }
         .dark #shelf h1{
         color:#eee;
         }
         .dark #shelf .subtitle{
         color:#888;
         }
         .dark .bookCard{
         filter:brightness(0.85);
         }
         .dark .bookTitle{
         color:#1a1a1a;
         }
         .dark canvas{
         filter:invert(1) hue-rotate(180deg);
         }
      </style>
   </head>
   <body>
      <!-- ── SHELF VIEW ── -->
      <div id="shelf">
         <h1>MSc Computing Notes</h1>
         <p class="subtitle">Tap a book to start reading</p>
         <div class="bookGrid" id="bookGrid"></div>
      </div>
      <!-- ── READER VIEW ── -->
      <div id="readerView">
         <div id="controls">
            <button onclick="goToShelf()">← Shelf</button>
            <div id="rightControls">
               <button onclick="toggleDark()">Dark</button>
            </div>
         </div>
         <div id="viewer">
            <canvas id="pdfCanvas"></canvas>
         </div>
         <div id="pageIndicator"></div>
      </div>
      <script>
         /* ── book catalogue ── */
         
         const BOOKS = [
         {
         id:"ml",
         title:"Machine Learning",
         emoji:"🤖",
         desc:"Compiled lecture notes",
         color:"#C3E0DD",
         path:"Machine Learning/Compiled Notes.pdf"
         },
         {
         id:"tsa",
         title:"Text & Sequence Analytics",
         emoji:"📝",
         desc:"Compiled lecture notes",
         color:"#D4E4BC",
         path:"Text and Sequence Analytics/Compiled Notes.pdf"
         },
         {
         id:"stats",
         title:"Statistical Computing",
         emoji:"📊",
         desc:"Compiled lecture notes",
         color:"#F7D9D9",
         path:"Statistical Computing/Compiled Notes.pdf"
         },
         {
         id:"statslab",
         title:"Stats Lab Notes",
         emoji:"🔎",
         desc:"Lab exercises & walkthroughs",
         color:"#FAE9DA",
         path:"Statistical Computing/Lab Notes.pdf"
         }
         ]
         
         const DARK_KEY = "reader-dark"
         
         let currentBook = null
         let pdfDoc = null
         let pageNum = 1
         let lastModified = null
         let updateTimer = null
         
         const canvas = document.getElementById("pdfCanvas")
         const ctx = canvas.getContext("2d")
         
         /* ── shelf rendering ── */
         
         function pageKey(book){
         return "reader-page-" + book.id
         }
         
         function renderShelf(){
         
         const grid = document.getElementById("bookGrid")
         grid.innerHTML = ""
         
         BOOKS.forEach(book=>{
         
         const saved = localStorage.getItem(pageKey(book))
         const card = document.createElement("div")
         card.className = "bookCard"
         card.style.background = book.color
         
         card.innerHTML =
         '<div class="bookEmoji">' + book.emoji + '</div>' +
         '<div class="bookTitle">' + book.title + '</div>' +
         '<div class="bookDesc">' + book.desc + '</div>' +
         (saved ? '<div class="bookProgress">Page ' + saved + '</div>' : '<div class="bookProgress">New</div>')
         
         card.addEventListener("click",()=> openBook(book))
         grid.appendChild(card)
         
         })
         
         }
         
         /* ── open / close book ── */
         
         async function openBook(book){
         
         currentBook = book
         pageNum = parseInt(localStorage.getItem(pageKey(book)) || "1")
         lastModified = null
         
         document.getElementById("shelf").style.display = "none"
         document.getElementById("readerView").style.display = "block"
         document.getElementById("pageIndicator").style.display = "block"
         
         await loadPDF()
         
         updateTimer = setInterval(()=> checkUpdate(),60000)
         
         }
         
         function goToShelf(){
         
         if(updateTimer){
         clearInterval(updateTimer)
         updateTimer = null
         }
         
         pdfDoc = null
         currentBook = null
         
         document.getElementById("readerView").style.display = "none"
         document.getElementById("pageIndicator").style.display = "none"
         document.getElementById("shelf").style.display = "block"
         
         renderShelf()
         
         }
         
         /* ── pdf loading ── */
         
         async function loadPDF(){
         
         const url = currentBook.path + "?t=" + Date.now()
         
         pdfDoc = await pdfjsLib.getDocument(url).promise
         
         if(pageNum > pdfDoc.numPages) pageNum = pdfDoc.numPages
         if(pageNum < 1) pageNum = 1
         
         renderPage(pageNum)
         
         }
         
         async function renderPage(num){
         
         const page = await pdfDoc.getPage(num)
         const viewport = page.getViewport({scale:1.6})
         
         canvas.width = viewport.width
         canvas.height = viewport.height
         
         await page.render({canvasContext:ctx,viewport:viewport}).promise
         
         document.getElementById("pageIndicator").innerText =
         num + " / " + pdfDoc.numPages
         
         localStorage.setItem(pageKey(currentBook),num)
         
         }
         
         /* ── page turning ── */
         
         function animateSlide(dir){
         document.getElementById("viewer").style.transform =
         "translateX(" + (dir * 80) + "px)"
         }
         
         function resetSlide(){
         document.getElementById("viewer").style.transform = "translateX(0)"
         }
         
         function nextPage(){
         if(!pdfDoc || pageNum >= pdfDoc.numPages) return
         animateSlide(-1)
         pageNum++
         setTimeout(()=>{renderPage(pageNum);resetSlide()},180)
         }
         
         function prevPage(){
         if(!pdfDoc || pageNum <= 1) return
         animateSlide(1)
         pageNum--
         setTimeout(()=>{renderPage(pageNum);resetSlide()},180)
         }
         
         /* ── dark mode ── */
         
         function toggleDark(){
         document.body.classList.toggle("dark")
         localStorage.setItem(DARK_KEY,document.body.classList.contains("dark"))
         }
         
         function loadDark(){
         if(localStorage.getItem(DARK_KEY) === "true"){
         document.body.classList.add("dark")
         }
         }
         
         /* ── auto update ── */
         
         async function checkUpdate(){
         if(!currentBook) return
         try{
         const res = await fetch(currentBook.path,{method:"HEAD"})
         const mod = res.headers.get("last-modified")
         if(!lastModified){lastModified = mod;return}
         if(mod && mod !== lastModified){
         lastModified = mod
         const cur = pageNum
         await loadPDF()
         pageNum = cur
         renderPage(pageNum)
         }
         }catch(e){}
         }
         
         /* ── touch / keyboard ── */
         
         let startX = 0
         
         document.addEventListener("touchstart",e=>{
         startX = e.touches[0].clientX
         })
         
         document.addEventListener("touchend",e=>{
         if(!currentBook) return
         const dx = e.changedTouches[0].clientX - startX
         if(Math.abs(dx) < 50) return
         dx < 0 ? nextPage() : prevPage()
         })
         
         document.addEventListener("keydown",e=>{
         if(!currentBook) return
         if(e.key === "ArrowRight") nextPage()
         if(e.key === "ArrowLeft") prevPage()
         if(e.key === "Escape") goToShelf()
         })
         
         /* ── init ── */
         
         loadDark()
         renderShelf()
         
      </script>
   </body>
</html>
